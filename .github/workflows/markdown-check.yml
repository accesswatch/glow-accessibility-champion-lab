name: Markdown check

on:
  push:
    branches: ["main", "module-*", "final-*"]
  pull_request:
    branches: ["main"]

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          # Rules, globs, and ignores all come from .markdownlint-cli2.jsonc
          # so this job matches the local lint exactly.
          globs: "**/*.md"
